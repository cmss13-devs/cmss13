author: "Puckaboo2"
delete-after: True
changes:
  - rscadd: "Each job role in medical has its own loadout with recommendations."
  - rscadd: "Adds a medium-length brown research coat."
  - rscadd: "Adds Field Doctor's locker contents into the vended essentials or vend loadout in case the replacement finds nothing in their locker."
  - rscadd: "Nurses and CMOs can have the same pouches as doctors."
  - rscadd: "Adds a sterile mask as part of medical staff's essentials."
  - rscadd: "Researchers can find white lab coats in their vending options."
  - rscadd: "Nurses can find lab coats in their vending options."
  - rscadd: "Adds a field doctor USCM uniform and surgical scrubs that camo like marine uniforms. Wear the scrubs if you want more bio protection, wear the uniform if you want to be more robust."
  - balance: "Due to the dangers medical personnel are expected to encounter, most lab coats are now built with basic protection against most types of damage, while Chief's and W-Y's lab coats are even more robust. This ain't Baystation, boys."
  - balance: "Added the same amount of bio and rad resist to CMO and RD's regular uniforms."
  - balance: "Most often, scrubs vs. medical uniforms have the same amount of bio resist."
  - code_imp: "Reorganized the medical equipment rack's items based on recommendation."
  - code_imp: "Tweaks scrub descriptions to say they protect against radiation.... Because they do."
  - rscdel: "Pharmaceutical Physician scrubs and caps have been removed from the game. The scrubs were repurposed as the Chemistry uniform."
  - rscdel: "Pharmaceutical Physician lab coats have been removed from PharmPhys loadouts and the chemical wardrobe. They were repurposed as chemistry lab coats."
  - rscdel: "Nuked a handful of pouches from Medical's ColMarTech machine. Medbay only. Don't worry, corpsmen, I didn't touch your stuff."
  - rscdel: "Replaced grey scrubs with black scrubs in the white medical wardrobe."
  - imageadd: "Adds a sterile2 mask onmob spite. Dunno what sterile2 is for, but it's there now."
  - imagetweak: "Most of the medical clothing has been re-shaded."
  - imagetweak: "Updated snowsuit sprites to be more soft, plush, and cozy. Try one on!"
  - maptweak: "Removed the chemistry wardrobe in the chem bay. It was getting stuffy in there."
  - qol: "Hats are below eyewear and above uniforms in medical equipment vendors."