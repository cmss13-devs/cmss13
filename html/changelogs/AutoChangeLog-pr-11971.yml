author: "JackieEstegado"
delete-after: True
changes:
  - rscadd: "Dropship modules can now be repaired with a welder."
  - rscadd: "Deployable (DS and non-DS) sentries and MGs now continuously sync their health between the module and the weapon."
  - balance: "Acid applied to an installed dropship module now deals damage overtime instead of simply deleting it."
  - balance: "Acided dropship modules can no longer be picked up with a powerloader."