author: "Antlers"
delete-after: True
changes:
  - maptweak: "Completely remodeled the brig"
  - maptweak: "Moved interrogation to be accessible by brigged prisoners without pausing their timers"
  - maptweak: "Moved the armory and execution rooms to a new lower level of the brig"
  - maptweak: "Expanded the CMP's office"
  - maptweak: "Expanded brig holding"
  - maptweak: "Expanded the yard"
  - maptweak: "Expanded the execution room"
  - maptweak: "Added an attachment vendor to the MP prep area (rejoice! I don't have to steal from your preps anymore)"
  - mapadd: "Added a basketball court to the yard"
  - mapadd: "Added a kitchenette to the yard"
  - mapadd: "Added a visitation area to the brig"
  - mapadd: "Added a new brig lobby area"
  - mapadd: "Added an MP cryo storage to the lower level evidence locker"
  - rscadd: "Plastic knives now have the basic sharpness trait and can cut food crudely"
  - rscadd: "Added a new mobile TV stand in brig storage"
  - rscadd: "Added a guaranteed black market tuner in brig evidence storage"
  - rscadd: "Added a new wall cryopod subtype"
  - rscadd: "Added a new \"brig\" subtype of the wall cryopod, which automatically informs MP's when a prisoner has cryo'd and ejects their incident report."
  - mapadd: "Added these new brig cryopods to brig perma cells"
  - bugfix: "CMP's office now requires CMP's credentials to access"
  - bugfix: "Document chest drawers now no longer grow into regular ones when items are placed inside"
  - bugfix: "Knife utensils will no longer scoop up food onto themselves, and instead will try to cut"
  - code_imp: "Added new brig areas"
  - code_imp: "Repathed plastic utensils to be subtypes of their respective normal utensils"
  - code_imp: "Fixed a runtime where radios attempted to send messages to atoms with null locations"
  - rscdel: "Removed the MP bunk areas"
  - rscdel: "Removed the yard hydroponics area (groceries are available in the kitchenette)"