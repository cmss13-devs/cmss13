2026-03-01:
  ComboTombo:
  - rscadd: Added marine combat boots and gloves of different variants to the synthetic
      clothing vendor and loadout menu
  MistChristmas:
  - admin: Psychic Property (ENCEPHALOPHRASIVE) is now Admin spawn only.
2026-03-02:
  Drathek:
  - bugfix: Mass screenshot verb will now optionally disable all open_space blur planes
      instead of just the first
  Unknownity:
  - balance: Roman weapons ie. Gladius, Javelin, Staff have been slightly damage buffed
      to deal with Yautja armor better. Gladius and Javelin also have additional description
      to them that you can raise/lower them.
  - balance: Romans are now immune to shrapnel.
  - bugfix: Roman Aquilifer's bear belt hat's onmob sprite facing west has been fixed.
  - bugfix: Historical Prey are no longer able to spawn with loadout vanity items.
  - bugfix: Romans no longer wear immersion breaking marine underwear.
  - rscadd: Roman soldiers now get IDs.
  dawsonkeyes:
  - bugfix: Pepperspray effects no longer stack infinitely
  ori-disillusion-mirnov:
  - bugfix: whitelisted predators can no longer spawn as a youngblood
2026-03-03:
  MistChristmas:
  - bugfix: Runner plush accepts no substitutes for a beret
2026-03-04:
  KCartridge:
  - imagetweak: (Mapping) adds alpha to open_space
2026-03-05:
  Drathek:
  - code_imp: Updated rust_g to 6.0.1 to address possible race conditions for spritesheet
      generation
  - bugfix: Fix larva fire protection trampling existing xeno fire signals
  Drathek Harry:
  - rscadd: 'FTL Hijack Evacuation: Old 50% threshold starts a FTL jump, 100% threshold
      arrives at a station that indefinitely spawns ERTs, failure allows SD (and lifeboat
      evac again if not crashed onto ground)'
  - rscadd: Multiz stairs and open_space now check if the destination is fully closed
      turfs to block travel (unless thrown in the case of open_space which will kill)
  - rscadd: Added an automatic door controller that checks for mobs in the area it
      is in that aren't dead and optionally some faction
  - admin: Map template placement has new options namely a way to expand playable
      space into space
  - code_imp: Projectors now support z shifts, can use a projector anchor to automatically
      detect a specific z, and initialize differently
  - code_imp: open_space turfs now can override how they determine the turf below
      them and SSmapping can determine Z transitions by coordinate
  - code_imp: Added /area/template_noop/conditional to act as a normal area noop unless
      the existing area matches a trigger
  - code_imp: Space turfs update their icon differently (removes an istype(src) check
  - code_imp: Weather subsystem can now support areas created after initialization
  - code_imp: Various main ship z level checks were replaced with a slightly more
      performant version
  - code_imp: Warheads now respect current name in cause_data, and can disable a tertiary
      explosion
  - code_imp: Ship weapons code now handles cause_data better
  - code_imp: ChangeTurf can now accept arbitrary arguments for Initialize of the
      new turf
  - code_imp: Cleaned up logic for update_connections for walls (they now update afterShuttleMove)
  - soundadd: Added a reversed version of an existing supercapcitors_charging sound
  - balance: Neurotoxin hallucinations cannot occur more frequently than every 15s
      now
  - balance: Most temporary hulls on the Almayer are now internal hull to prevent
      mining during hijack
  - balance: Resin traps now properly respect is_resin_allowed as they should have
  - ui: Added FTL status to escape pods UI
  - bugfix: Fixed ERT shuttles missing no tunnel flag
  - bugfix: Fixed a couple ways for base lighting to double up overlays
  - bugfix: Fixed a niche scenario where creating a mob hud would fail to offset blur
      plane masters correctly if Initialize is delayed
  - config: Shipmap json files now need to specify ground_crash_template_name, crack_open_horizontal_positions,
      and open_space_bounds
  - mapadd: Added a crashed Almayer template and umbilical docks
  - maptweak: Changed umbilical cord docking ports on the Almayer with the south (port)
      dock allowing larger shuttles and removed a stray pipe on bottom Z
  - maptweak: All map borders that were a shuttle turf are converted to a cordon (UpdatePaths
      script provided)
  - maptweak: Fixed OOB/sky areas on LV624, Kutjevo, Hybrisa, New Varadero, Soro,
      Chances Claim, and BigRed
  MistChristmas:
  - bugfix: Working Joes get the right skills
  MoondancerPony:
  - bugfix: fixed Trijent Dam water filtration causing extreme lag
  - bugfix: fixed Trijent Dam red water not causing damage
  - bugfix: fixed odd viewing angles on staircases
  hry-gh:
  - bugfix: makes the relay browser use the new calculation system
