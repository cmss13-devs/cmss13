  Blundir. Forest2001. LCMS1.:
  - rscadd: Adds a second heavy-duty stretcher to containment cells to compensate
      for the longer travel time.
  - maptweak: The entirety of upper medical have been re-mapped, and research received
      an expansion that involves the addition of new rooms, such as a conference room,
      and changes for the quality of life of the researchers themselves (Players that
      like to play as researchers have been consulted on what could be done to improve
      their gameplay). Containment have been transferred down to the middle deck and
      is now connected to the upper via a staircase localized in the center of the
      Research Wing.
  - maptweak: Changes to lower medbay. Ladders have been alligned to the original
      design pre-multiz, door shutters in the Operation Theatres now work separately
      again, misceallanous allignment and offsetting work for some of the objects.
  - code_imp: Raises bio-protection of labcoats from 15 to 50. Made sure latex gloves
      and sterile masks would have 15 of bio-protection each aswell. Changed the role's
      entry message a little.
  - code_imp: Added a sub-variation of the medical vendor (for researchers) that use
      different name, description and icon.
  - code_imp: Changed and improved prep vendor loadout for researchers. Added a series
      of new clothing items, allowing bigger aesthetical freedom. Made small spelling
      adjusts to other prep vendor loadouts in the file.
  - code_imp: Changes area code for containment and removes the upperdeck "fakezlevel"
      tag.
  - code_imp: Changes tech points' code so now only recovered alien bodies storaged
      in containment CELLS will count as being storaged. Leaving bodies in the middle
      of the hall don't count for points anymore.
  - code_imp: Improves research display code by checking if a cell uses a shutter
      before showing it's respective control button.
  - code_imp: Updates old airlock code to not use single letter elements, recodes
      "airlock locking" procedure in a way that the airlock will first be closed before
      trying to lock, instead of being locked open.
  - imageadd: Adds improved versions of containment walls and windows for a more aesthetically-pleasing
      mapping.
  - imageadd: Adds new three-tile airlock for containment, kudos to Blundir for sending
      me the core sprites.
  - imageadd: Adds white "generic" airlock, based on the medical one (it's just the
      same airlock, but the red crosses are gone), intended to replace the older,
      silver version in locations where it is still used (bathrooms, bunkrooms, etcetera).
  - imagetweak: Fixes containment cell tiles and reorganizes them inside the file,
      fixes a good amount of spriting mistakes and codes all possible directions for
      the turfs, allowing for a much better mapping experience in overall.
  - bugfix: Fixes duplicated wheelchairs in the Debilitated's Storage room.
  - bugfix: Fixes the bloodbag box in the Field Doctor's preparation spawning without
      empty bloodbags and removes the bloodbags on the table that, instead of being
      actual bloodbags, are useless props.
  - bugfix: Fixes being able to fill sandbags shipside by replacing the real grass
      tiles inside the Psychatric Care Unit with proper, fake ones.
  - spellcheck: Fix spelling on entry message and 'supervisors' for researchers.
  - spellcheck: Fix spelling on gear vendor item displays.
